name: Docker Build and Test

on:
  push:
  pull_request:

jobs:
  docker-build-test:
    name: Build and test Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t mcdc:dev .

      - name: Verify MC/DC imports correctly
        run: |
          docker run --rm mcdc:dev python -c "import mcdc; print('MC/DC import OK')"

      - name: Run unit tests inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/opt/mcdc \
            -w /opt/mcdc/test/unit \
            mcdc:dev python run.py

  singularity-build:
    name: Build Singularity images
    runs-on: ubuntu-latest
    needs: docker-build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.4

      - name: Build CPU image
        run: |
          apptainer build containers/mcdc-cpu.sif containers/mcdc-cpu.def

      - name: Test CPU image
        run: |
          apptainer exec containers/mcdc-cpu.sif python -c "import mcdc; print('MC/DC CPU OK')"