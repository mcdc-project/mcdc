name: Docker Build and Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  docker-build-test:
    name: Build and test Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f containers/Dockerfile -t mcdc:dev .

      - name: Verify MC/DC imports correctly
        run: |
          docker run --rm mcdc:dev python -c "import mcdc; print('MC/DC import OK')"

      - name: Run unit tests inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/opt/mcdc \
            -w /opt/mcdc/test/unit \
            mcdc:dev python run.py
            