name: Docker Build, Test, and Publish

on:
  push:
    branches: [dev, main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [dev, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cement-psaap/mcdc

jobs:
  docker-build-test:
    name: Build and test (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: cpu
            dockerfile: containers/Dockerfile
            suffix: ""
            run_tests: true
          - variant: cuda
            dockerfile: containers/Dockerfile.cuda
            suffix: "-cuda"
            run_tests: false
          - variant: rocm
            dockerfile: containers/Dockerfile.rocm
            suffix: "-rocm"
            run_tests: false

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine branch name
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BRANCH_NAME=${{ github.base_ref }}" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            -t mcdc:${{ env.BRANCH_NAME }}${{ matrix.suffix }} .

      - name: Verify MC/DC imports correctly
        run: |
          docker run --rm mcdc:${{ env.BRANCH_NAME }}${{ matrix.suffix }} \
            python -c "import mcdc; print('MC/DC import OK')"

      - name: Run unit tests inside container
        if: matrix.run_tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/opt/mcdc \
            -w /opt/mcdc/test/unit \
            mcdc:${{ env.BRANCH_NAME }}${{ matrix.suffix }} python run.py

      - name: Login to GitHub Container Registry
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to registry
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG="${{ env.BRANCH_NAME }}${{ matrix.suffix }}"

          # Tag with branch name (e.g., dev, dev-cuda, dev-rocm)
          docker tag mcdc:${TAG} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}
          # Tag with branch + date (archive)
          docker tag mcdc:${TAG} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-${DATE}

          # Push both
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}-${DATE}

          echo "Pushed: ${TAG} and ${TAG}-${DATE}"