# =============================================================================
# Regression Tests
# =============================================================================
# Runs regression tests directly on the runner across Python 3.13
# Complements the Docker workflow by validating native installs.
# =============================================================================

name: Regression Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Temporary flag for node24 migration; remove when GitHub default switches.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UCX_TLS: self,sm,tcp

jobs:
  regression-test:
    name: ${{ matrix.mode }} (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python modes:
          - mode: Python-Serial
            python-version: '3.13'
            run_cmd: "python -m pytest test/regression"
            timeout: 10
          - mode: Python-MPI
            python-version: '3.13'
            run_cmd: |
              python -m pytest test/regression --mpiexec=4
            timeout: 30
          # Numba modes:
          - mode: Numba-Serial
            python-version: '3.13'
            run_cmd: "python -m pytest test/regression --mode numba"
            timeout: 120
          - mode: Numba-MPI
            python-version: '3.13'
            run_cmd: |
              python -m pytest test/regression --mode numba --mpiexec=4
            timeout: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up MPI
        uses: mpi4py/setup-mpi@v1

      - name: Install mpi4py (from source, linked to system MPI)
        run: |
          pip install --upgrade pip
          pip install --no-binary=mpi4py mpi4py

      - name: Install MC/DC
        run: |
          pip install -e ".[dev]"
          # Verify mpi4py is the source-built version, not silently overridden by [dev] extras
          python -c "import mpi4py; print(f'mpi4py {mpi4py.__version__} from {mpi4py.__file__}')"

      - name: Run regression tests (${{ matrix.mode }})
        run: ${{ matrix.run_cmd }}
