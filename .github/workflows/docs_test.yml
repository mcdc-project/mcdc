name: Test Build the Docs

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: "ubuntu-latest"
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up MPI
        uses: mpi4py/setup-mpi@v1

      - name: Install mpi4py
        run: |
          pip install --upgrade pip
          pip install --no-binary=mpi4py mpi4py

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          # If you have extras for docs, use this:
          python -m pip install ".[docs]"
          # Otherwise, something like:
          # python -m pip install . sphinx sphinx-autodoc-typehints ...
          python -m pip list

      - name: Build the docs
        working-directory: docs
        run: make html

      - name: Run Python snippets
        run: |
            python -c '
            from docutils.core import publish_doctree
            from docutils import nodes
            from docutils.parsers.rst import roles

            def dummy_role(name, rawtext, text, lineno, inliner, options=None, content=None):
                return [nodes.Text(text)], []

            roles.register_local_role("doc", dummy_role)

            rst = open("docs/source/user/first_mcdc.rst").read()

            for node in publish_doctree(rst).findall(nodes.literal_block):
                if node.get("classes") == ['code', 'python3']:
                    print(node.astext())
            '  > tmp.py
            cat -n tmp.py
            python tmp.py